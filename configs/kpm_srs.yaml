# Combined KPM MAC RSRP/SINR + SRS CIR/CFR (Phase 3 Option A)
#
# Both xApps can run at once:
#   xapp_kpm_moni --mac-rsrp-tcp 127.0.0.1:8081
#   xapp_srs_ind  --srs-cir-tcp  127.0.0.1:8082
#   pyoranris run -c configs/kpm_srs.yaml
#
# Single-stream fallbacks remain:
#   configs/kpm_mac_rsrp.yaml
#   configs/srs_cir.yaml

profile: kpm_srs

features:
  xapp_server: false
  xapp_client: false
  mac_rsrp_tcp: true
  auto_connect_mac_rsrp: true
  srs_cir_tcp: true
  auto_connect_srs_cir: true
  ris: false
  ris_rest: true
  auto_apply_ris_on_start: true
  ue_evk: false
  marvelmind: false
  robot_redis: false
  gps: false
  quectel: false
  record_mobility: true
  data_collection: false
  simulate_rsrp: false
  mobility_reopt: false
  auto_start_xapp: false

network:
  host: "127.0.0.1"
  xapp_port: 8081
  srs_port: 8082
  ris_rest_url: "http://localhost:8080/api/beam/apply"

plot:
  rsrp_ylim: [-90.0, 30.0]
  sinr_ylim: [-20.0, 50.0]
  ris_angle_ylim: [20.0, 60.0]
  cfr_ylim: [0.0, 0.0]
  cir_ylim: [0.0, 0.0]
  srs_ylim_floor: 1.0
  max_points: 600

beams:
  max_ris_index: 21
  default_ris_index: 1
  ris_angle_min: 20.0
  ris_angle_max: 60.0

lab_ops:
  flexric_script: "~/Program_scripts/flexric_scripts/oai-flexric.sh"
  kpm_report_period_ms: 100
  xapp_duration: -1
  srs_max_bins: 1536
  srs_fft_size: 0

logging:
  root_dir: "data"

devices:
  font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"
