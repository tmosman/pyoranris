# Indoor UE mobility demo — enable services you actually have online.
extends: lab_default.yaml

profile: indoor_mobility

features:
  xapp_server: true
  xapp_client: true
  ris: true
  ue_evk: false
  marvelmind: false
  record_mobility: true
  mobility_reopt: false
  auto_start_xapp: false

logging:
  root_dir: "data"
  mobility_subdir: "UE_Mobility"
